# ═══════════════════════════════════════════════════════════════
# PELICULA — application-prod.yml (entorno remoto: Railway/Render)
# Todos los valores sensibles vienen de variables de entorno,
# definidas en el panel de Railway/Render para este servicio.
# ═══════════════════════════════════════════════════════════════

server:
  port: ${PORT:8081}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    register-with-eureka: ${EUREKA_REGISTER:true}
    fetch-registry: ${EUREKA_REGISTER:true}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
