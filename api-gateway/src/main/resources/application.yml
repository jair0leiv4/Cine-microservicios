# ═══════════════════════════════════════════════════════════════
# API GATEWAY — application.yml
# Centraliza el enrutamiento hacia los 10 microservicios del
# sistema de cine. Usa Spring Cloud Gateway MVC (servlet stack).
# ═══════════════════════════════════════════════════════════════

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:
          - id: categoria
            uri: lb://CATEGORIA
            predicates:
              - Path=/api/categorias/**
          - id: pelicula
            uri: lb://PELICULA
            predicates:
              - Path=/api/peliculas/**
          - id: sala
            uri: lb://SALA
            predicates:
              - Path=/api/salas/**
          - id: asiento
            uri: lb://ASIENTO
            predicates:
              - Path=/api/asientos/**
          - id: funcion
            uri: lb://FUNCION
            predicates:
              - Path=/api/funciones/**
          - id: entrada
            uri: lb://ENTRADA
            predicates:
              - Path=/api/entradas/**
          - id: producto
            uri: lb://PRODUCTO
            predicates:
              - Path=/api/productos/**
          - id: cliente
            uri: lb://CLIENTE
            predicates:
              - Path=/api/clientes/**
          - id: venta
            uri: lb://VENTA
            predicates:
              - Path=/api/ventas/**
          - id: pago
            uri: lb://PAGO
            predicates:
              - Path=/api/pagos/**

server:
  port: ${PORT:8090}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
